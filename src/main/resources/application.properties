spring.application.name=volunteer


# ─── Database ───────────────────────────────────────────
spring.datasource.url=your-database-url
spring.datasource.username=admin
spring.datasource.password=your password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Server ─────────────────────────────────────────────
server.port=8080

# ─── JWT ────────────────────────────────────────────────
jwt.secret=volunteerhub-super-secret-key-change-this-in-production-256bit
jwt.expiration=86400000

# ─── CORS (update after CloudFront is ready) ────────────
app.cors.allowed-origins=http://localhost:5500,http://localhost:3000