<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VolunteerHub — Events</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green:#1a6b3c; --green2:#228b4e; --lime:#4caf72; --white:#f5f9f6; --gray:#7a8a80; --red:#e05252; --bg:#f0f5f1; --dark:#0f2d1c; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }
    nav { background: var(--dark); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; background: var(--lime); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; color: var(--dark); font-size: 18px; }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--white); }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: var(--gray); text-decoration: none; font-size: 14px; font-weight: 500; }
    .nav-links a.active, .nav-links a:hover { color: var(--white); }
    .btn-logout { padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--white); background: transparent; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 32px; width: 360px; text-align: center; }
    .modal h3 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--dark); margin-bottom: 10px; }
    .modal p { color: var(--gray); font-size: 14px; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 12px; }
    .btn-cancel-modal { flex:1; padding:12px; border:1.5px solid #ddd; border-radius:10px; background:white; color:var(--dark); font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; }
    .btn-confirm { flex:1; padding:12px; background:var(--red); border:none; border-radius:10px; color:white; font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; }

    main { padding: 40px; max-width: 1100px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--dark); }
    .page-header p { color: var(--gray); font-size: 14px; margin-top: 4px; }
    .btn-create { padding: 10px 20px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; display: none; }

    .filter-bar { background: white; border-radius: 14px; padding: 16px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .filter-label { font-size: 13px; color: var(--gray); font-weight: 500; }
    .filter-btn { padding: 7px 16px; border: 1.5px solid #cde0d4; border-radius: 20px; background: white; font-size: 13px; color: var(--dark); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .filter-btn.active, .filter-btn:hover { background: var(--green); color: white; border-color: var(--green); }
    .search-input { padding: 8px 16px; border: 1.5px solid #cde0d4; border-radius: 20px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--dark); outline: none; margin-left: auto; min-width: 200px; }
    .search-input:focus { border-color: var(--green); }

    .events-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

    .event-card { background: white; border-radius: 16px; overflow: hidden; transition: transform 0.2s; }
    .event-card:hover { transform: translateY(-4px); }
    .event-banner { height: 8px; }
    .banner-env { background: linear-gradient(90deg,#1a6b3c,#4caf72); }
    .banner-health { background: linear-gradient(90deg,#a32d2d,#e05252); }
    .banner-social { background: linear-gradient(90deg,#1a3a6b,#3a7bc8); }
    .banner-edu { background: linear-gradient(90deg,#633806,#c9a84c); }

    .event-body { padding: 20px; }
    .event-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
    .event-cat-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
    .cat-env { background: #e8f5ee; color: var(--green); }
    .cat-health { background: #fde8e8; color: var(--red); }
    .cat-social { background: #e8eef8; color: #1a3a6b; }
    .cat-edu { background: #fdf3e3; color: #633806; }

    .status-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
    .status-upcoming { background: #e8eef8; color: #1a3a6b; }
    .status-ongoing { background: #e8f5ee; color: var(--green); }
    .status-completed { background: #f0f5f1; color: var(--gray); }

    .event-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--dark); margin-bottom: 8px; line-height: 1.3; }
    .event-desc { font-size: 13px; color: var(--gray); line-height: 1.5; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .event-meta-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .event-meta-item { font-size: 12px; color: var(--gray); }

    /* Slot progress bar */
    .slots-bar-wrap { margin-bottom: 14px; }
    .slots-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
    .slots-bar-label .taken { font-weight: 500; color: var(--dark); }
    .slots-bar-label .total { color: var(--gray); }
    .slots-bar { height: 6px; background: #e8f0ea; border-radius: 10px; overflow: hidden; }
    .slots-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
    .fill-ok { background: var(--lime); }
    .fill-warn { background: #c9a84c; }
    .fill-full { background: var(--red); }

    .event-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid #f0f5f1; gap: 8px; }

    /* Signup button states */
    .btn-signup { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
    .btn-signup.available { background: var(--green); color: white; }
    .btn-signup.available:hover { background: var(--green2); }
    .btn-signup.pending { background: #fdf3e3; color: #633806; cursor: default; }
    .btn-signup.accepted { background: #e8f5ee; color: var(--green); cursor: default; }
    .btn-signup.rejected { background: #fde8e8; color: var(--red); cursor: default; }
    .btn-signup.full { background: #fde8e8; color: var(--red); cursor: not-allowed; }
    .btn-signup.completed { background: #f0f5f1; color: var(--gray); cursor: not-allowed; }

    .admin-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-edit { padding: 6px 14px; background: #fdf3e3; color: #633806; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .btn-delete { padding: 6px 14px; background: #fde8e8; color: var(--red); border: none; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    .full-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #fde8e8; color: var(--red); }

    .empty { text-align: center; padding: 60px; color: var(--gray); grid-column: 1/-1; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    .msg-toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 200; display: none; }
    .msg-toast.success { background: #e8f5ee; color: #0f5c3a; border: 1px solid #9FE1CB; display: block; }
    .msg-toast.error { background: #fde8e8; color: #7a0f0f; border: 1px solid #F7C1C1; display: block; }
  </style>
</head>
<body>

<div class="modal-overlay" id="logout-modal">
  <div class="modal">
    <h3>Sign Out?</h3>
    <p>Are you sure you want to sign out?</p>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeLogout()">Cancel</button>
      <button class="btn-confirm" onclick="confirmLogout()">Sign Out</button>
    </div>
  </div>
</div>

<div class="msg-toast" id="toast"></div>

<nav>
  <div class="logo"><div class="logo-icon">V</div><div class="logo-text">VolunteerHub</div></div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="events.html" class="active">Events</a>
    <a href="my-events.html">My Events</a>
    <a href="create-event.html" id="nav-create" style="display:none">Create Event</a>
  </div>
  <button class="btn-logout" onclick="showLogout()">Sign Out</button>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1>All Events</h1>
      <p>Browse and sign up for volunteer opportunities</p>
    </div>
    <a href="create-event.html" class="btn-create" id="btn-create">+ Create Event</a>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="filterEvents('all', this)">All</button>
    <button class="filter-btn" onclick="filterEvents('UPCOMING', this)">Upcoming</button>
    <button class="filter-btn" onclick="filterEvents('Environment', this)">Environment</button>
    <button class="filter-btn" onclick="filterEvents('Health', this)">Health</button>
    <button class="filter-btn" onclick="filterEvents('Social', this)">Social</button>
    <button class="filter-btn" onclick="filterEvents('Education', this)">Education</button>
    <input type="text" class="search-input" placeholder="Search events..." oninput="searchEvents(this.value)"/>
  </div>

  <div class="events-grid" id="events-grid">
    <div class="empty"><div class="empty-icon">📅</div>Loading events...</div>
  </div>
</main>

<script>
  const API = "http://localhost:8080";
  const userId = localStorage.getItem('userId');
  const role = localStorage.getItem('role');
  if (!userId) window.location.href = 'login.html';

  if (role === 'ADMIN') {
    document.getElementById('btn-create').style.display = 'block';
    document.getElementById('nav-create').style.display = 'block';
  }

  let allEvents = [];
  let mySignups = {}; // eventId -> signupStatus (PENDING/ACCEPTED/REJECTED)
  let currentFilter = 'all';
  let searchQuery = '';

  const catClass = { Environment:'cat-env', Health:'cat-health', Social:'cat-social', Education:'cat-edu' };
  const bannerClass = { Environment:'banner-env', Health:'banner-health', Social:'banner-social', Education:'banner-edu' };
  const catIcon = { Environment:'🌳', Health:'❤️', Social:'🤝', Education:'📚' };

  async function loadEvents() {
    try {
      const [eventsRes, myRes] = await Promise.all([
        fetch(API + '/api/events'),
        fetch(API + '/api/volunteer/my-events/' + userId)
      ]);
      allEvents = await eventsRes.json();
      const myEvents = await myRes.json();
      mySignups = {};
      myEvents.forEach(e => { mySignups[e.id] = e.signupStatus; });
      renderEvents();
    } catch(e) {
      document.getElementById('events-grid').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Failed to load. Is Spring Boot running?</div>';
    }
  }

  function filterEvents(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEvents();
  }

  function searchEvents(q) { searchQuery = q.toLowerCase(); renderEvents(); }

  function renderEvents() {
    let filtered = allEvents;
    if (currentFilter !== 'all') filtered = filtered.filter(e => e.status === currentFilter || e.category === currentFilter);
    if (searchQuery) filtered = filtered.filter(e => e.title.toLowerCase().includes(searchQuery) || e.location.toLowerCase().includes(searchQuery));

    const grid = document.getElementById('events-grid');
    if (filtered.length === 0) { grid.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No events found.</div>'; return; }

    grid.innerHTML = filtered.map(e => {
      const signupStatus = mySignups[e.id]; // undefined / PENDING / ACCEPTED / REJECTED
      const isCompleted = e.status === 'COMPLETED';
      const isFull = e.isFull;
      const accepted = e.acceptedCount || 0;
      const max = e.maxVolunteers || 1;
      const pct = Math.min(100, Math.round((accepted / max) * 100));
      const fillClass = pct >= 100 ? 'fill-full' : pct >= 70 ? 'fill-warn' : 'fill-ok';

      // Determine button state
      let btnText, btnClass, btnDisabled = false, btnOnclick = '';
      if (isCompleted) { btnText = 'Completed'; btnClass = 'completed'; btnDisabled = true; }
      else if (signupStatus === 'PENDING') { btnText = '⏳ Pending Approval'; btnClass = 'pending'; btnDisabled = true; }
      else if (signupStatus === 'ACCEPTED') { btnText = '✅ Accepted'; btnClass = 'accepted'; btnDisabled = true; }
      else if (signupStatus === 'REJECTED') { btnText = '❌ Rejected'; btnClass = 'rejected'; btnDisabled = true; }
      else if (isFull) { btnText = '🔴 Event Full'; btnClass = 'full'; btnDisabled = true; }
      else { btnText = 'Request to Join'; btnClass = 'available'; btnOnclick = `onclick="requestSignup(${e.id})"` ; }

      const adminActions = role === 'ADMIN' ? `
        <div class="admin-actions">
          <button class="btn-edit" onclick="editEvent(${e.id})">Edit</button>
          <button class="btn-delete" onclick="deleteEvent(${e.id}, '${e.title.replace(/'/g,"\\'")}')">Delete</button>
        </div>` : '';

      return `
        <div class="event-card">
          <div class="event-banner ${bannerClass[e.category] || 'banner-env'}"></div>
          <div class="event-body">
            <div class="event-top">
              <span class="event-cat-badge ${catClass[e.category] || 'cat-env'}">${catIcon[e.category] || '📅'} ${e.category || 'General'}</span>
              <span class="status-pill status-${e.status.toLowerCase()}">${e.status}</span>
            </div>
            <div class="event-title">${e.title}</div>
            <div class="event-desc">${e.description || 'No description.'}</div>
            <div class="event-meta-row">
              <div class="event-meta-item">📍 ${e.location}</div>
              <div class="event-meta-item">🗓️ ${e.eventDate} &nbsp; ⏰ ${e.startTime} - ${e.endTime}</div>
            </div>
            <div class="slots-bar-wrap">
              <div class="slots-bar-label">
                <span class="taken">${accepted} / ${max} filled</span>
                <span class="total">${isFull ? '🔴 Full' : (max - accepted) + ' slots left'}</span>
              </div>
              <div class="slots-bar"><div class="slots-bar-fill ${fillClass}" style="width:${pct}%"></div></div>
            </div>
            <div class="event-footer">
              ${role !== 'ADMIN' ? `<button class="btn-signup ${btnClass}" ${btnDisabled ? 'disabled' : btnOnclick}>${btnText}</button>` : `<span class="full-badge">${isFull ? '🔴 Full' : accepted + ' signed up'}</span>`}
            </div>
            ${adminActions}
          </div>
        </div>`;
    }).join('');
  }

  async function requestSignup(eventId) {
    try {
      const res = await fetch(API + '/api/volunteer/signup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: parseInt(userId), eventId })
      });
      const data = await res.json();
      if (res.ok) {
        mySignups[eventId] = 'PENDING';
        showToast('Request sent! Waiting for admin approval.', 'success');
        renderEvents();
      } else { showToast(data.message || 'Failed to send request', 'error'); }
    } catch(e) { showToast('Connection error', 'error'); }
  }

  async function deleteEvent(id, title) {
    if (!confirm(`Delete "${title}"?`)) return;
    try {
      const res = await fetch(API + '/api/events/' + id, { method: 'DELETE' });
      if (res.ok) { allEvents = allEvents.filter(e => e.id !== id); renderEvents(); showToast('Event deleted', 'success'); }
    } catch(e) { showToast('Connection error', 'error'); }
  }

  function editEvent(id) { window.location.href = 'create-event.html?edit=' + id; }

  function showToast(msg, type) {
    const t = document.getElementById('toast'); t.innerText = msg; t.className = 'msg-toast ' + type;
    setTimeout(() => { t.className = 'msg-toast'; }, 3500);
  }
  function showLogout() { document.getElementById('logout-modal').classList.add('show'); }
  function closeLogout() { document.getElementById('logout-modal').classList.remove('show'); }
  function confirmLogout() { localStorage.clear(); window.location.href = 'login.html'; }

  loadEvents();
</script>
</body>
</html>
